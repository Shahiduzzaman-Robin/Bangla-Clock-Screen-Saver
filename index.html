<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আধুনিক বাংলা ডিজিটাল ঘড়ি | Bangla Digital Clock</title>
    <link rel="stylesheet" href="style.css?v=1.17">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="stars-canvas"></canvas>
    <div class="background-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    
    <main class="clock-container">
        <div class="glass-card">
            <header class="clock-header">
                <div style="width: 40px;"></div>
                <div class="couple-container">
                    <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M33.2803 158.651C31.3612 195.622 29.874 258.794 29.874 284.684" stroke="currentColor" stroke-opacity="0.5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M373.955 155.244C369.325 200.546 373.766 245.979 369.575 291.175" stroke="currentColor" stroke-opacity="0.5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M18 243.808C136.519 244.281 267.543 244.804 381.417 245.258" stroke="currentColor" stroke-opacity="0.5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M88.2517 172.304C65.0964 172.304 41.3253 172.304 18 172.304" stroke="currentColor" stroke-opacity="0.5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M211.114 172.275C201.009 172.275 190.636 172.275 180.457 172.275" stroke="currentColor" stroke-opacity="0.5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M381.423 172.275C356.723 172.275 331.366 172.275 306.485 172.275" stroke="currentColor" stroke-opacity="0.5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M88.2517 207.43C65.0964 207.43 41.3253 207.43 18 207.43" stroke="currentColor" stroke-opacity="0.5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M381.428 207.401C356.728 207.401 331.371 207.401 306.49 207.401" stroke="currentColor" stroke-opacity="0.5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M126.924 105.295C134.453 95.847 145.46 96.1992 155.093 102.785C199.058 132.859 103.485 181.364 115.786 116.587" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M233.997 107.456C282.711 65.7203 294.93 177.858 232.818 141.143C223.415 135.582 228.085 122.02 231.052 114.425" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M232.862 166.938C231.321 194.448 224.923 221.505 213.166 245.724" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M273.662 166.938C279.556 194.312 279.922 228.259 297.58 249.944" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M261.105 242.91C260.231 262.769 265.223 282.334 265.223 302" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M239.264 247.13C241.082 264.149 239.145 281.535 231.457 297.779" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M273.662 166.938C293.249 183.941 299.532 200.867 280.389 223.213" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M231.456 168.345C216.816 188.014 200.381 209.721 196.284 233.062" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M162.519 158.497C172.035 187.662 182.356 225.039 194.878 233.062" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M106.243 162.717C99.8715 184.433 84.6154 210.296 88.6112 233.062" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M110.463 162.717C106.928 185.886 108.781 211.862 106.242 237.283" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M162.519 162.717C162.519 186.124 162.519 209.523 162.519 233.062" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M120.799 223.214C124.716 247.87 114.636 272.305 118.326 296.372" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M145.635 227.434C145.901 250.59 152.669 273.297 152.669 296.372" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <button id="fullscreen-btn" title="ফুল স্ক্রিন">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </header>

            <div class="time-display">
                <!-- Dummy AM/PM box to perfectly balance the layout and keep clock centered -->
                <div class="ampm-box" style="visibility: hidden;">
                    <span id="ampm-dummy">পূর্বাহ্ণ</span>
                </div>
                
                <div class="time-box" id="hours-box">
                    <div class="digit-box" id="hours">
                        <div class="digit-inner">
                            <span>০০</span>
                        </div>
                    </div>
                    <span class="label">ঘণ্টা</span>
                </div>
                <span class="separator">:</span>
                <div class="time-box" id="minutes-box">
                    <div class="digit-box" id="minutes">
                        <div class="digit-inner">
                            <span>০০</span>
                        </div>
                    </div>
                    <span class="label">মিনিট</span>
                </div>
                <span class="separator">:</span>
                <div class="time-box" id="seconds-box">
                    <div class="digit-box" id="seconds">
                        <div class="digit-inner">
                            <span>০০</span>
                        </div>
                    </div>
                    <span class="label">সেকেন্ড</span>
                </div>
                <div class="ampm-box" id="ampm-container">
                    <span id="ampm">পূর্বাহ্ণ</span>
                </div>
            </div>

            <footer class="date-display">
                <div id="full-date" class="full-date-text">শনিবার, ১ জানুয়ারি ২০২৬ || ১ বৈশাখ ১৪৩৩</div>
                <div id="location-container" class="location-wrapper">
                    <span id="location" class="location-text">স্থান নির্ধারণ করা হচ্ছে...</span>
                    <span id="weather-dot" class="dot-separator" style="opacity: 0;">•</span>
                    <span id="temp" class="temp-text"></span>
                </div>
                <div class="user-signature">
                    <svg class="mac-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M18.71 19.5C17.88 20.74 17 21.95 15.66 21.97C14.32 22 13.89 21.18 12.37 21.18C10.84 21.18 10.37 21.95 9.09997 22C7.78997 22.05 6.79997 20.68 5.95997 19.47C4.24997 17 2.93997 12.45 4.69997 9.39C5.56997 7.87 7.12997 6.91 8.81997 6.88C10.1 6.86 11.32 7.75 12.11 7.75C12.89 7.75 14.37 6.68 15.92 6.84C16.57 6.87 18.39 7.1 19.56 8.82C19.47 8.88 17.39 10.1 17.41 12.63C17.44 15.65 20.06 16.66 20.09 16.67C20.06 16.74 19.67 18.11 18.71 19.5ZM13 3.5C13.73 2.67 14.94 2.04 15.94 2C16.07 3.17 15.6 4.35 14.9 5.19C14.21 6.04 13.07 6.7 11.95 6.61C11.8 5.46 12.36 4.26 13 3.5Z"/></svg>
                    <span class="user-name">শহিদুজ্জামান রবিন</span>
                </div>
            </footer>
        </div>
    </main>


    <script src="script.js"></script>
</body>
</html>
