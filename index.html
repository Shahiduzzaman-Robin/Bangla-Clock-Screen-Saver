<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আধুনিক বাংলা ডিজিটাল ঘড়ি | Bangla Digital Clock</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    
    <main class="clock-container">
        <div class="glass-card">
            <header class="clock-header">
                <div></div> <!-- Empty spacer to keep fullscreen button on the right -->
                <button id="fullscreen-btn" title="ফুল স্ক্রিন">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </header>

            <div class="time-display">
                <div class="time-box" id="hours-box">
                    <div class="digit-box" id="hours">
                        <div class="digit-inner">
                            <span>০০</span>
                        </div>
                    </div>
                    <span class="label">ঘণ্টা</span>
                </div>
                <span class="separator">:</span>
                <div class="time-box" id="minutes-box">
                    <div class="digit-box" id="minutes">
                        <div class="digit-inner">
                            <span>০০</span>
                        </div>
                    </div>
                    <span class="label">মিনিট</span>
                </div>
                <span class="separator">:</span>
                <div class="time-box" id="seconds-box">
                    <div class="digit-box" id="seconds">
                        <div class="digit-inner">
                            <span>০০</span>
                        </div>
                    </div>
                    <span class="label">সেকেন্ড</span>
                </div>
                <div class="ampm-box" id="ampm-container">
                    <span id="ampm">পূর্বাহ্ণ</span>
                </div>
            </div>

            <footer class="date-display">
                <div id="full-date">শুক্রবার, ১ জানুয়ারি ২০২৬</div>
                <div id="location" class="location-text">স্থান নির্ধারণ করা হচ্ছে...</div>
                <div class="user-signature">
                    <svg class="mac-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M18.71 19.5C17.88 20.74 17 21.95 15.66 21.97C14.32 22 13.89 21.18 12.37 21.18C10.84 21.18 10.37 21.95 9.09997 22C7.78997 22.05 6.79997 20.68 5.95997 19.47C4.24997 17 2.93997 12.45 4.69997 9.39C5.56997 7.87 7.12997 6.91 8.81997 6.88C10.1 6.86 11.32 7.75 12.11 7.75C12.89 7.75 14.37 6.68 15.92 6.84C16.57 6.87 18.39 7.1 19.56 8.82C19.47 8.88 17.39 10.1 17.41 12.63C17.44 15.65 20.06 16.66 20.09 16.67C20.06 16.74 19.67 18.11 18.71 19.5ZM13 3.5C13.73 2.67 14.94 2.04 15.94 2C16.07 3.17 15.6 4.35 14.9 5.19C14.21 6.04 13.07 6.7 11.95 6.61C11.8 5.46 12.36 4.26 13 3.5Z"/></svg>
                    <span>শহিদুজ্জামান রবিন</span>
                </div>
            </footer>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
